server {
    listen 443 ssl http2;
    server_name intake.icorrect.co.uk;

    ssl_certificate /etc/letsencrypt/live/intake.icorrect.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intake.icorrect.co.uk/privkey.pem;

    root /home/ricky/builds/intake-system/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8016;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /team {
        auth_basic "iCorrect Intake Team";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri /index.html;
    }

    location / {
        try_files $uri /index.html;
    }
}
